<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Subdivision Metronome</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SubDiv Metro">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  :root {
    --bg:      #0e0e10;
    --surface: #18181c;
    --border:  #2a2a32;
    --text:    #e8e8f0;
    --muted:   #5a5a6e;
    --accent:  #c9b97a;
    --clr-q:   #f5f0e8;
    --clr-32:  #8b7fd4;
    --clr-6:   #d4886a;
    --clr-64:  #4aaa84;
    --on-32:   rgba(139,127,212,0.25);
    --on-6:    rgba(212,136,106,0.22);
    --on-64:   rgba(74,170,132,0.20);
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background:var(--bg); color:var(--text); font-family:var(--mono);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:18px; padding:18px 14px;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
  }

  h1 { font-size:10px; font-weight:400; letter-spacing:0.28em; color:var(--muted); text-transform:uppercase; }

  /* ── BPM ── */
  .bpm-block { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bpm-row   { display:flex; align-items:baseline; gap:8px; }
  .bpm-display { font-size:80px; font-weight:700; line-height:1; letter-spacing:-0.04em; color:var(--text); }
  .bpm-unit    { font-size:11px; letter-spacing:0.25em; color:var(--muted); }
  .bpm-controls { display:flex; align-items:center; }
  .bpm-btn {
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:13px;
    width:42px; height:42px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation;
  }
  .bpm-btn:first-child { border-radius:6px 0 0 6px; }
  .bpm-btn:last-child  { border-radius:0 6px 6px 0; }
  .bpm-btn+.bpm-btn    { border-left:none; }
  .bpm-btn:active { background:var(--border); color:var(--accent); }
  input[type=range] {
    -webkit-appearance:none; width:150px; height:2px;
    background:var(--border); border:none; outline:none;
    cursor:pointer; border-left:none; border-right:none; touch-action:manipulation;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:18px; height:18px;
    border-radius:50%; background:var(--accent); cursor:pointer;
  }

  /* ── Time signature ── */
  .timesig-block {
    display:flex; align-items:center; gap:14px;
  }
  .timesig-label { font-size:9px; letter-spacing:0.15em; color:var(--muted); }
  .timesig-display {
    display:flex; flex-direction:column; align-items:center; gap:0;
    position:relative;
  }
  .timesig-display::after {
    content:''; position:absolute; top:50%; left:-4px; right:-4px;
    height:1px; background:var(--border);
  }
  .timesig-num, .timesig-den {
    font-size:26px; font-weight:700; line-height:1.1;
    color:var(--text); cursor:pointer;
    padding:2px 10px; border-radius:3px;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: color 0.1s;
  }
  .timesig-num:active, .timesig-den:active { color:var(--accent); }

  .timesig-arrows {
    display:flex; flex-direction:column; gap:4px;
  }
  .ts-arrow {
    background:var(--surface); border:1px solid var(--border);
    color:var(--muted); font-family:var(--mono); font-size:11px;
    width:28px; height:24px; border-radius:3px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  }
  .ts-arrow:active { background:var(--border); color:var(--text); }

  .timesig-sep { display:flex; flex-direction:column; gap:4px; }

  /* ── Grid section ── */
  .grid-section { width:100%; max-width:600px; display:flex; flex-direction:column; gap:7px; }
  .grid-row { display:flex; align-items:center; gap:8px; }
  .grid-label { font-size:9px; color:var(--muted); width:28px; text-align:right; flex-shrink:0; letter-spacing:0.08em; }
  .cells { display:flex; gap:2px; flex:1; }

  /* Quarter */
  .cell-q {
    flex:1; height:18px; border-radius:2px;
    background:var(--surface); border:1px solid var(--border);
    transition: background 0.03s, box-shadow 0.03s;
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  }
  .cell-q.lit   { background:var(--clr-q);  border-color:var(--clr-q);  box-shadow:0 0 9px rgba(245,240,232,.5); }
  .cell-q.lit-a { background:var(--accent); border-color:var(--accent); box-shadow:0 0 13px rgba(201,185,122,.65); }
  .cell-q.off   { opacity:0.22; border-style:dashed; }

  /* Generic tappable cell */
  .cell-tap {
    border-radius:2px; background:var(--surface); border:1px solid var(--border);
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.05s, border-color 0.05s, box-shadow 0.04s;
  }
  .cell-tap.beat-start { border-left:2px solid #3c3c4a; }

  .cell-32 { flex:1; height:38px; }
  .cell-32.on  { background:var(--on-32); border-color:var(--clr-32); }
  .cell-32.lit { background:var(--clr-32) !important; border-color:var(--clr-32) !important; box-shadow:0 0 10px rgba(139,127,212,.8); }
  .cell-32.tap-flash { background:rgba(139,127,212,0.5) !important; }

  .cell-6  { flex:1; height:38px; }
  .cell-6.on  { background:var(--on-6); border-color:var(--clr-6); }
  .cell-6.lit { background:var(--clr-6) !important; border-color:var(--clr-6) !important; box-shadow:0 0 10px rgba(212,136,106,.8); }
  .cell-6.tap-flash { background:rgba(212,136,106,0.5) !important; }

  /* 64th: no visible grid, just zoom button row */
  .zoom-row-btn {
    display:flex; align-items:center; gap:8px;
  }
  .zoom-row-label { font-size:9px; color:var(--muted); width:28px; text-align:right; flex-shrink:0; }

  /* beat hints row */
  .beat-hints { display:flex; margin-left:36px; gap:2px; }
  .beat-hint  { flex:1; font-size:8px; color:var(--muted); padding-left:2px; }

  /* Q on/off toggle */
  .q-toggle {
    background:none; border:1px solid var(--border); color:var(--muted);
    font-family:var(--mono); font-size:9px; letter-spacing:0.1em;
    padding:3px 9px; border-radius:3px; cursor:pointer;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition:all 0.1s;
  }
  .q-toggle.off { border-color:#444; color:#444; text-decoration:line-through; }

  /* ── Zoom overlay (shared for 32 and 64) ── */
  #zoomOverlay {
    display:none; position:fixed; inset:0; z-index:100;
    background:var(--bg); flex-direction:column;
    align-items:center; justify-content:center; gap:14px; padding:20px;
  }
  #zoomOverlay.open { display:flex; }
  .zoom-header {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; max-width:480px;
  }
  .zoom-title { font-size:11px; letter-spacing:0.2em; color:var(--muted); }
  .zoom-close {
    background:none; border:1px solid var(--border); color:var(--muted);
    font-family:var(--mono); font-size:11px; padding:6px 14px; border-radius:4px;
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  }
  .zoom-close:active { border-color:var(--text); color:var(--text); }

  .zoom-beat-nav { display:flex; gap:10px; align-items:center; }
  .zoom-nav-btn {
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:18px;
    width:48px; height:48px; border-radius:6px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  }
  .zoom-nav-btn:active { background:var(--border); }
  .zoom-beat-label { font-size:26px; font-weight:700; color:var(--text); min-width:80px; text-align:center; }

  .zoom-cells { display:flex; gap:4px; width:100%; max-width:480px; flex-wrap:wrap; }

  /* 32nd zoom cell: 8 per beat */
  .zoom-cell-32 {
    width:calc(12.5% - 4px); height:68px; border-radius:4px;
    background:var(--surface); border:2px solid var(--border);
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.05s, border-color 0.05s, box-shadow 0.05s;
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:5px;
    flex-shrink:0;
  }
  .zoom-cell-32 span { font-size:8px; color:var(--muted); }
  .zoom-cell-32.on   { background:var(--on-32); border-color:var(--clr-32); }
  .zoom-cell-32.on span { color:var(--clr-32); }
  .zoom-cell-32.lit  { background:var(--clr-32) !important; border-color:var(--clr-32) !important; box-shadow:0 0 12px rgba(139,127,212,.9); }
  .zoom-cell-32.tap-flash { background:rgba(139,127,212,0.5) !important; }

  /* 64th zoom cell: 16 per beat */
  .zoom-cell-64 {
    width:calc(6.25% - 3px); height:56px; border-radius:3px;
    background:var(--surface); border:2px solid var(--border);
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.04s, border-color 0.04s, box-shadow 0.04s;
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:4px;
    flex-shrink:0;
  }
  .zoom-cell-64 span { font-size:7px; color:var(--muted); }
  .zoom-cell-64.on   { background:var(--on-64); border-color:var(--clr-64); }
  .zoom-cell-64.on span { color:var(--clr-64); }
  .zoom-cell-64.lit  { background:var(--clr-64) !important; border-color:var(--clr-64) !important; box-shadow:0 0 10px rgba(74,170,132,.9); }
  .zoom-cell-64.tap-flash { background:rgba(74,170,132,0.4) !important; }

  /* 6-tuplet zoom cell: 6 per beat */
  .zoom-cell-6 {
    width:calc(16.6666% - 4px); height:68px; border-radius:4px;
    background:var(--surface); border:2px solid var(--border);
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.05s, border-color 0.05s, box-shadow 0.05s;
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:5px;
    flex-shrink:0;
  }
  .zoom-cell-6 span { font-size:8px; color:var(--muted); }
  .zoom-cell-6.on   { background:var(--on-6); border-color:var(--clr-6); }
  .zoom-cell-6.on span { color:var(--clr-6); }
  .zoom-cell-6.lit  { background:var(--clr-6) !important; border-color:var(--clr-6) !important; box-shadow:0 0 12px rgba(212,136,106,.9); }
  .zoom-cell-6.tap-flash { background:rgba(212,136,106,0.5) !important; }

  .zoom-hint { font-size:9px; color:var(--muted); letter-spacing:0.1em; }

  /* ── Sub-row action buttons (zoom 32 / 6 / 64 + clear), evenly distributed ── */
  .sub-toggles { display:flex; gap:6px; margin-left:36px; }
  .sub-btn {
    flex:1 1 0; min-width:0;
    background:none; border:1px solid var(--border); color:var(--muted);
    font-family:var(--mono); font-size:9px; letter-spacing:0.04em;
    padding:6px 4px; border-radius:3px; cursor:pointer; text-align:center;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: all 0.1s; white-space:nowrap;
  }
  .sub-btn-32 { border-color:var(--clr-32); color:var(--clr-32); }
  .sub-btn-32:active { background:var(--on-32); }
  .sub-btn-6  { border-color:var(--clr-6);  color:var(--clr-6);  }
  .sub-btn-6:active  { background:var(--on-6); }
  .sub-btn-64 { border-color:var(--clr-64); color:var(--clr-64); }
  .sub-btn-64:active { background:var(--on-64); }
  .sub-btn-clear:active { border-color:var(--text); color:var(--text); }

  /* ── Play ── */
  .play-btn {
    width:70px; height:70px; border-radius:50%;
    border:2px solid var(--accent); background:transparent;
    color:var(--accent); font-size:26px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.1s, transform 0.08s;
  }
  .play-btn:active { transform:scale(0.92); }
  .play-btn.playing { border-color:var(--text); color:var(--text); }

  /* ── Legend ── */
  .legend { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; font-size:9px; color:var(--muted); }
  .legend-item { display:flex; align-items:center; gap:4px; }
  .ldot { width:7px; height:7px; border-radius:1px; }
  .lq { background:var(--clr-q); } .l32 { background:var(--clr-32); }
  .l6 { background:var(--clr-6); } .l64 { background:var(--clr-64); }

  /* ── Tap BPM ── */
  .tap-bpm-btn {
    width:120px; height:48px; border-radius:8px;
    border:2px solid var(--accent); background:transparent;
    color:var(--accent); font-family:var(--mono); font-size:16px;
    font-weight:700; letter-spacing:0.2em; cursor:pointer;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.08s, transform 0.06s;
  }
  .tap-bpm-btn:active { background:rgba(201,185,122,0.15); transform:scale(0.95); }
  .tap-bpm-btn.tapping { border-color:var(--clr-q); color:var(--clr-q); }
  .tap-hint { font-size:9px; color:var(--muted); letter-spacing:0.12em; }

  /* ── Volume ── */
  .vol-row { display:flex; align-items:center; gap:8px; margin-top:2px; }
  .vol-label { font-size:9px; letter-spacing:0.18em; color:var(--muted); width:28px; }
  #volSlider { width:120px; }
</style>
</head>
<body>

<h1>Subdivision Metronome</h1>

<!-- BPM -->
<div class="bpm-block">
  <div class="bpm-row">
    <div class="bpm-display" id="bpmDisplay">80</div>
    <div class="bpm-unit">BPM</div>
  </div>
  <div class="bpm-controls">
    <button class="bpm-btn" id="btnM10">−10</button>
    <button class="bpm-btn" id="btnM1">−1</button>
    <input type="range" id="bpmSlider" min="30" max="240" value="80">
    <button class="bpm-btn" id="btnP1">+1</button>
    <button class="bpm-btn" id="btnP10">+10</button>
  </div>
  <button class="tap-bpm-btn" id="tapBpmBtn">TAP</button>
  <div class="tap-hint" id="tapHint">リズムに合わせてタップ</div>
  <div class="vol-row">
    <span class="vol-label">VOL</span>
    <input type="range" id="volSlider" min="0" max="100" value="80">
  </div>
</div>

<!-- Time Signature -->
<div class="timesig-block">
  <div class="timesig-label">拍子</div>
  <div class="timesig-sep">
    <div class="ts-arrow" id="numUp">▲</div>
    <div class="ts-arrow" id="numDn">▼</div>
  </div>
  <div class="timesig-display">
    <div class="timesig-num" id="tsNum">4</div>
    <div class="timesig-den" id="tsDen">4</div>
  </div>
  <div class="timesig-sep">
    <div class="ts-arrow" id="denUp">▲</div>
    <div class="ts-arrow" id="denDn">▼</div>
  </div>
  <button class="q-toggle" id="qToggle">♩ 全ON</button>
</div>

<!-- Main grid -->
<div class="grid-section">

  <div class="grid-row">
    <div class="grid-label" id="labelQ">♩</div>
    <div class="cells" id="cellsQ"></div>
  </div>

  <div class="grid-row">
    <div class="grid-label">32</div>
    <div class="cells" id="cells32"></div>
  </div>
  <div class="beat-hints" id="hints32"></div>

  <!-- 6連・64分はズーム専用（メイングリッドなし） -->
  <div class="sub-toggles">
    <button class="sub-btn sub-btn-32"    id="zoom32Btn">🔍 32分</button>
    <button class="sub-btn sub-btn-6"     id="zoom6Btn">🔍 6連</button>
    <button class="sub-btn sub-btn-64"    id="zoom64Btn">🔍 64分</button>
    <button class="sub-btn sub-btn-clear" id="clearSubBtn">✕ クリア</button>
  </div>
</div>

<button class="play-btn" id="playBtn">▶</button>

<div class="legend">
  <div class="legend-item"><div class="ldot lq"></div>拍（ON/OFF可）</div>
  <div class="legend-item"><div class="ldot l32"></div>32分・タップON</div>
  <div class="legend-item"><div class="ldot l6"></div>6連・ズームのみ</div>
  <div class="legend-item"><div class="ldot l64"></div>64分・ズームのみ</div>
</div>

<!-- Zoom overlay -->
<div id="zoomOverlay">
  <div class="zoom-header">
    <div class="zoom-title" id="zoomTitle">32分　ズームビュー</div>
    <button class="zoom-close" id="zoomClose">✕ 閉じる</button>
  </div>
  <div class="zoom-beat-nav">
    <button class="zoom-nav-btn" id="zoomPrev">◀</button>
    <div class="zoom-beat-label" id="zoomBeatLabel">拍 1</div>
    <button class="zoom-nav-btn" id="zoomNext">▶</button>
  </div>
  <div class="zoom-cells" id="zoomCells"></div>
  <div class="zoom-hint" id="zoomHint">セルをタップして ON / OFF</div>
</div>

<script>
// ═══════════════════════════════════════════
// Grid: BASE=192 steps per beat
// 1拍(beat) = 192 steps
// 32nd per beat = 8  → step interval = 192/8  = 24
// 6-tuplet /beat = 6  → step interval = 192/6  = 32
// 64th per beat  = 16 → step interval = 192/16 = 12
// ═══════════════════════════════════════════
const BEAT_STEPS = 192;
const S32_I = 24;   // step interval for 32nd within 1 beat
const S6_I  = 32;   // step interval for 6-tuplet within 1 beat
const S64_I = 12;   // step interval for 64th within 1 beat

const PER_BEAT_32 = BEAT_STEPS / S32_I;  // 8
const PER_BEAT_6  = BEAT_STEPS / S6_I;   // 6
const PER_BEAT_64 = BEAT_STEPS / S64_I;  // 16

const LOOKAHEAD = 0.025;
const SCHED_MS  = 10;

// ── Time signature state ──
let tsNum = 4;   // numerator  1..12
let tsDen = 4;   // denominator 2,4,8
const DEN_OPTIONS = [2, 4, 8];

// ── Runtime state ──
let bpm = 80, playing = false;
let qOn = true;   // quarter note on/off
let zoomMode = '32';  // '32' | '6' | '64'
let zoomBeat = 0;
let master = null;    // master gain (volume) node
let vol = 0.8;        // 0..1

// on/off arrays — sized for max possible beats (12) × per-beat cells
const MAX_BEATS = 12;
let on32 = [];
let on6  = [];
let on64 = [];
let onQ  = [];   // per-beat on/off for quarter notes

// ── Persistence (localStorage) ──
const STORE_KEY = 'subdivMetro.v1';
let savedArrays = null;   // grid arrays from a previous session, applied after resetArrays()

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (typeof s.bpm   === 'number') bpm   = Math.max(30, Math.min(240, s.bpm));
    if (typeof s.tsNum === 'number') tsNum = Math.max(1, Math.min(12, s.tsNum));
    if (DEN_OPTIONS.includes(s.tsDen)) tsDen = s.tsDen;
    if (typeof s.vol   === 'number') vol   = Math.max(0, Math.min(1, s.vol));
    savedArrays = { onQ: s.onQ, on32: s.on32, on6: s.on6, on64: s.on64 };
  } catch (e) { /* corrupt or unavailable storage — start fresh */ }
}
function copyInto(target, src) {
  if (!Array.isArray(src)) return;
  for (let i = 0; i < target.length && i < src.length; i++) target[i] = !!src[i];
}
let saveTimer = null;
function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({ bpm, tsNum, tsDen, vol, onQ, on32, on6, on64 }));
    } catch (e) { /* storage full / unavailable — ignore */ }
  }, 150);
}

function resetArrays() {
  const total32 = tsNum * PER_BEAT_32;
  const total6  = tsNum * PER_BEAT_6;
  const total64 = tsNum * PER_BEAT_64;
  on32 = new Array(total32).fill(false);
  on6  = new Array(total6).fill(false);
  on64 = new Array(total64).fill(false);
  onQ  = new Array(tsNum).fill(true);   // all beats ON by default
}

loadState();
resetArrays();
// restore saved grid contents (sized to current time signature)
if (savedArrays) {
  copyInto(onQ,  savedArrays.onQ);
  copyInto(on32, savedArrays.on32);
  copyInto(on6,  savedArrays.on6);
  copyInto(on64, savedArrays.on64);
  savedArrays = null;
}

let BASE = tsNum * BEAT_STEPS;  // total steps per measure

let audioCtx = null, schedTimer = null;
let nextTime = 0, curStep = 0, displayStep = -1;

// ── Audio ──
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function getMaster() {
  const ctx = getCtx();
  if (!master) { master = ctx.createGain(); master.gain.value = vol; master.connect(ctx.destination); }
  return master;
}
function setVol(v) {
  vol = Math.max(0, Math.min(1, v));
  if (master) master.gain.setTargetAtTime(vol, getCtx().currentTime, 0.01);
}

// Unified, sharp metronome click.
// All subdivisions share the SAME envelope shape + transient, and differ
// only in pitch (freq) and level (gain) so the family sounds consistent.
//   - tonal body: a near-pure sine with a tiny downward chirp (keeps pitch identity, no "boing")
//   - 0.5ms attack + short exponential decay  → crisp, punchy
//   - a few ms of high-passed noise transient  → adds the sharp "tick" edge
function click(time, freq, gain, decay) {
  const ctx = getCtx();
  const out = getMaster();

  // tonal body
  const osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq * 1.18, time);
  osc.frequency.exponentialRampToValueAtTime(freq, time + decay * 0.6);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0.0001, time);
  og.gain.exponentialRampToValueAtTime(gain, time + 0.0005);     // ~0.5ms attack
  og.gain.exponentialRampToValueAtTime(0.0001, time + decay);
  osc.connect(og); og.connect(out);
  osc.start(time); osc.stop(time + decay + 0.01);

  // high-passed noise transient for crisp edge
  const tlen = Math.ceil(ctx.sampleRate * 0.004);
  const buf = ctx.createBuffer(1, tlen, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < tlen; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / tlen);
  const ns = ctx.createBufferSource(); ns.buffer = buf;
  const hp = ctx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = Math.max(1600, freq * 1.4);
  const ng = ctx.createGain(); ng.gain.value = gain * 0.45;
  ns.connect(hp); hp.connect(ng); ng.connect(out);
  ns.start(time); ns.stop(time + 0.006);
}

const beatQ  =(t,first)=>click(t,first?1800:1400,first?0.95:0.72,first?0.030:0.028);
const beat32 =(t)=>click(t,1050,0.50,0.022);
const beat6  =(t)=>click(t, 880,0.50,0.022);
const beat64 =(t)=>click(t, 700,0.40,0.018);

// ── Tap helper ──
function tappable(el, fn) {
  let touched=false;
  el.addEventListener('touchstart',e=>{
    e.preventDefault(); touched=true;
    el.classList.add('tap-flash');
    fn();
    setTimeout(()=>el.classList.remove('tap-flash'),70);
  },{passive:false});
  el.addEventListener('click',()=>{if(touched){touched=false;return;}fn();});
}

// ── Build grids ──
function buildQ() {
  const el=document.getElementById('cellsQ'); el.innerHTML='';
  const labels={2:'𝅗𝅥',4:'♩',8:'♪'};
  document.getElementById('labelQ').textContent = labels[tsDen]||'♩';
  for(let i=0;i<tsNum;i++){
    const c=document.createElement('div');
    c.className='cell-q'+(onQ[i]?'':' off');
    const idx=i;
    tappable(c,()=>{
      onQ[idx]=!onQ[idx];
      c.classList.toggle('off',!onQ[idx]);
      saveState();
    });
    el.appendChild(c);
  }
}

function buildTapGrid(containerId, cls, totalCells, beatSize, onArr, hintId) {
  const el=document.getElementById(containerId); el.innerHTML='';
  for(let i=0;i<totalCells;i++){
    const c=document.createElement('div');
    c.className=`cell-tap ${cls}`+(i%beatSize===0?' beat-start':'')+(onArr[i]?' on':'');
    const idx=i;
    tappable(c,()=>{
      onArr[idx]=!onArr[idx];
      c.classList.toggle('on',onArr[idx]);
      if(zoomMode==='32'&&containerId==='cells32') refreshZoom();
      saveState();
    });
    el.appendChild(c);
  }
  if(hintId){
    const h=document.getElementById(hintId); h.innerHTML='';
    for(let i=0;i<totalCells;i++){
      const hc=document.createElement('div'); hc.className='beat-hint';
      if(i%beatSize===0) hc.textContent=Math.floor(i/beatSize)+1;
      h.appendChild(hc);
    }
  }
}

function rebuildGrids() {
  BASE = tsNum * BEAT_STEPS;
  buildQ();
  buildTapGrid('cells32','cell-32', tsNum*PER_BEAT_32, PER_BEAT_32, on32, 'hints32');
  // 6連 and 64分 are zoom-only — no main grid
  if(zoomBeat >= tsNum) zoomBeat = tsNum-1;
}

rebuildGrids();

// ── Time signature controls ──
function setTimeSig(num, den) {
  tsNum = Math.max(1, Math.min(12, num));
  tsDen = DEN_OPTIONS.includes(den) ? den : 4;
  document.getElementById('tsNum').textContent = tsNum;
  document.getElementById('tsDen').textContent = tsDen;
  resetArrays();
  rebuildGrids();
  if(document.getElementById('zoomOverlay').classList.contains('open')) buildZoom();
  if(playing){ stopMetronome(); startMetronome(); }
  saveState();
}

tappable(document.getElementById('numUp'), ()=>setTimeSig(tsNum+1, tsDen));
tappable(document.getElementById('numDn'), ()=>setTimeSig(tsNum-1, tsDen));
tappable(document.getElementById('denUp'), ()=>{
  const i=DEN_OPTIONS.indexOf(tsDen);
  setTimeSig(tsNum, DEN_OPTIONS[Math.min(i+1,DEN_OPTIONS.length-1)]);
});
tappable(document.getElementById('denDn'), ()=>{
  const i=DEN_OPTIONS.indexOf(tsDen);
  setTimeSig(tsNum, DEN_OPTIONS[Math.max(i-1,0)]);
});

// ── Quarter all-on / all-off toggle ──
// Tapping cycles: 全ON → 全OFF → 全ON...
tappable(document.getElementById('qToggle'),()=>{
  const allOn = onQ.every(v=>v);
  const newVal = !allOn;
  for(let i=0;i<tsNum;i++) onQ[i]=newVal;
  const qCells=document.getElementById('cellsQ').children;
  for(let i=0;i<tsNum;i++) qCells[i].classList.toggle('off',!onQ[i]);
  const btn=document.getElementById('qToggle');
  btn.textContent=newVal?'♩ 全ON':'♩ 全OFF';
  btn.classList.toggle('off',!newVal);
  saveState();
});

// ── Zoom (shared overlay for 32 / 6 / 64) ──
// Each mode shares one overlay; they differ only in cells-per-beat, the
// backing on/off array, the cell CSS class, and whether the main 32nd grid
// needs to mirror edits. arr is a getter because resetArrays() reallocates.
const ZOOM_CFG = {
  '32': { per:PER_BEAT_32, arr:()=>on32, cls:'zoom-cell-32', title:'32分　ズームビュー', mirror32:true },
  '6' : { per:PER_BEAT_6,  arr:()=>on6,  cls:'zoom-cell-6',  title:'6連　ズームビュー' },
  '64': { per:PER_BEAT_64, arr:()=>on64, cls:'zoom-cell-64', title:'64分　ズームビュー' },
};
const zoomOpen = ()=>document.getElementById('zoomOverlay').classList.contains('open');

function openZoom(mode) {
  zoomMode=mode;
  document.getElementById('zoomTitle').textContent = ZOOM_CFG[mode].title;
  document.getElementById('zoomHint').textContent = 'セルをタップして ON / OFF';
  buildZoom();
  document.getElementById('zoomOverlay').classList.add('open');
}

function buildZoom() {
  const el=document.getElementById('zoomCells'); el.innerHTML='';
  document.getElementById('zoomBeatLabel').textContent=`拍 ${zoomBeat+1} / ${tsNum}`;
  const cfg=ZOOM_CFG[zoomMode];
  const onArr=cfg.arr();
  const offset=zoomBeat*cfg.per;
  for(let i=0;i<cfg.per;i++){
    const idx=offset+i;
    const c=document.createElement('div');
    c.className=cfg.cls+(onArr[idx]?' on':'');
    const sp=document.createElement('span'); sp.textContent=i+1; c.appendChild(sp);
    tappable(c,()=>{
      onArr[idx]=!onArr[idx];
      c.classList.toggle('on',onArr[idx]);
      if(cfg.mirror32){
        const mc=document.getElementById('cells32').children;
        if(mc[idx]) mc[idx].classList.toggle('on',onArr[idx]);
      }
      saveState();
    });
    el.appendChild(c);
  }
}

function refreshZoom() {
  if(!zoomOpen()) return;
  const cfg=ZOOM_CFG[zoomMode];
  const onArr=cfg.arr();
  const offset=zoomBeat*cfg.per;
  const el=document.getElementById('zoomCells');
  for(let i=0;i<cfg.per;i++) if(el.children[i]) el.children[i].classList.toggle('on',onArr[offset+i]);
}

function updateZoomDisplay(beatIdx, subIdx) {
  if(!zoomOpen()) return;
  if(beatIdx!==zoomBeat) return;
  const el=document.getElementById('zoomCells');
  for(const c of el.children) c.classList.remove('lit');
  if(subIdx<ZOOM_CFG[zoomMode].per && el.children[subIdx]) el.children[subIdx].classList.add('lit');
}

tappable(document.getElementById('zoom32Btn'),()=>openZoom('32'));
tappable(document.getElementById('zoom6Btn'), ()=>openZoom('6'));
tappable(document.getElementById('zoom64Btn'),()=>openZoom('64'));

// ── Clear all subdivisions (32分以下を全OFF) ──
tappable(document.getElementById('clearSubBtn'),()=>{
  on32.fill(false); on6.fill(false); on64.fill(false);
  for(const c of document.getElementById('cells32').children) c.classList.remove('on');
  if(zoomOpen()) buildZoom();
  saveState();
});

tappable(document.getElementById('zoomClose'),()=>document.getElementById('zoomOverlay').classList.remove('open'));
tappable(document.getElementById('zoomPrev'),()=>{ zoomBeat=(zoomBeat+tsNum-1)%tsNum; buildZoom(); });
tappable(document.getElementById('zoomNext'),()=>{ zoomBeat=(zoomBeat+1)%tsNum; buildZoom(); });

// ── Scheduler ──
function scheduleStep(step, time) {
  const beatIdx  = Math.floor(step / BEAT_STEPS);
  const beatStep = step % BEAT_STEPS;  // 0..191 within beat

  // ── Quarter / beat pulse ──
  if(beatStep === 0) {
    if(onQ[beatIdx]) beatQ(time, beatIdx===0);
    return;
  }

  // ── 32nd ──
  if(beatStep % S32_I === 0) {
    const subIdx = beatStep / S32_I;          // 1..7 within beat
    const arrIdx = beatIdx * PER_BEAT_32 + subIdx;
    if(on32[arrIdx]) beat32(time);
  }

  // ── 6-tuplet ──
  if(beatStep % S6_I === 0) {
    const subIdx = beatStep / S6_I;
    const arrIdx = beatIdx * PER_BEAT_6 + subIdx;
    if(on6[arrIdx]) beat6(time);
  }

  // ── 64th (skip positions already covered by 32nd or 6-tuplet) ──
  if(beatStep % S64_I === 0) {
    const subIdx = beatStep / S64_I;
    const arrIdx = beatIdx * PER_BEAT_64 + subIdx;
    const is32 = (beatStep % S32_I === 0);
    const is6  = (beatStep % S6_I  === 0);
    if(!is32 && !is6 && on64[arrIdx]) beat64(time);
  }
}

function scheduler() {
  const ctx=getCtx();
  // step duration = 1 beat duration / BEAT_STEPS
  // 1 beat duration = 60/bpm × (4/tsDen)  ← denominator scaling
  const beatDur = (60/bpm) * (4/tsDen);
  const stepDur = beatDur / BEAT_STEPS;

  while(nextTime < ctx.currentTime + LOOKAHEAD){
    scheduleStep(curStep, nextTime);
    const s=curStep, t=nextTime;
    const delay=Math.max(0,(t-ctx.currentTime)*1000);
    setTimeout(()=>updateDisplay(s),delay);
    curStep=(curStep+1)%BASE;
    nextTime+=stepDur;
  }
}

function startMetronome(){
  const ctx=getCtx();
  if(ctx.state==='suspended') ctx.resume();
  curStep=0; nextTime=ctx.currentTime+0.05;
  schedTimer=setInterval(scheduler,SCHED_MS);
}
function stopMetronome(){
  clearInterval(schedTimer); clearDisplay(); displayStep=-1;
}

// ── Display ──
function clearDisplay(){
  for(const c of document.getElementById('cellsQ').children)  c.classList.remove('lit','lit-a');
  for(const c of document.getElementById('cells32').children) c.classList.remove('lit');
  const zc=document.getElementById('zoomCells');
  for(const c of zc.children) c.classList.remove('lit');
}

function updateDisplay(step){
  if(step===displayStep) return; displayStep=step;
  const qC  =document.getElementById('cellsQ').children;
  const c32 =document.getElementById('cells32').children;

  for(const c of qC)  c.classList.remove('lit','lit-a');
  for(const c of c32) c.classList.remove('lit');

  const beatIdx  = Math.floor(step/BEAT_STEPS);
  const beatStep = step % BEAT_STEPS;

  // quarter
  if(beatStep===0) qC[beatIdx].classList.add(beatIdx===0?'lit-a':'lit');

  // 32nd position in main grid
  const idx32 = beatIdx*PER_BEAT_32 + Math.floor(beatStep/S32_I);
  if(c32[idx32]) c32[idx32].classList.add('lit');

  // zoom display — step index depends on the active zoom mode
  const I = zoomMode==='32'?S32_I : zoomMode==='6'?S6_I : S64_I;
  updateZoomDisplay(beatIdx, Math.floor(beatStep/I));
}

// ── BPM ──
function setBpm(v){
  bpm=Math.max(30,Math.min(240,v));
  document.getElementById('bpmDisplay').textContent=bpm;
  document.getElementById('bpmSlider').value=bpm;
  saveState();
}
document.getElementById('bpmSlider').addEventListener('input',e=>setBpm(+e.target.value));
document.getElementById('btnM10').addEventListener('click',()=>setBpm(bpm-10));
document.getElementById('btnM1').addEventListener('click', ()=>setBpm(bpm-1));
document.getElementById('btnP1').addEventListener('click', ()=>setBpm(bpm+1));
document.getElementById('btnP10').addEventListener('click',()=>setBpm(bpm+10));

// ── Play ──
const playBtn=document.getElementById('playBtn');
tappable(playBtn,()=>{
  playing=!playing;
  if(playing){playBtn.textContent='■';playBtn.classList.add('playing');startMetronome();}
  else        {playBtn.textContent='▶';playBtn.classList.remove('playing');stopMetronome();}
});

// ── Tap BPM ──
let tapTimes = [];
let tapTimer = null;

tappable(document.getElementById('tapBpmBtn'), () => {
  const now = performance.now();
  // reset if last tap was >3 seconds ago
  if (tapTimes.length > 0 && now - tapTimes[tapTimes.length-1] > 3000) {
    tapTimes = [];
  }
  tapTimes.push(now);
  // need at least 2 taps to calculate
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i=1; i<tapTimes.length; i++) intervals.push(tapTimes[i]-tapTimes[i-1]);
    const avg = intervals.reduce((a,b)=>a+b,0)/intervals.length;
    const tapped = Math.round(60000/avg);
    setBpm(tapped);
    const btn = document.getElementById('tapBpmBtn');
    btn.classList.add('tapping');
    document.getElementById('tapHint').textContent =
      tapTimes.length < 4 ? `タップ中... (${tapTimes.length})` : `検出: ${tapped} BPM`;
    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => {
      tapTimes = [];
      btn.classList.remove('tapping');
      document.getElementById('tapHint').textContent = 'リズムに合わせてタップ';
    }, 3000);
  } else {
    document.getElementById('tapHint').textContent = 'もう1回タップ...';
  }
});

// ── Volume control ──
const volSlider=document.getElementById('volSlider');
volSlider.addEventListener('input',e=>{ setVol(+e.target.value/100); saveState(); });

// ── Reflect loaded state into the UI ──
function syncUI(){
  document.getElementById('bpmDisplay').textContent=bpm;
  document.getElementById('bpmSlider').value=bpm;
  document.getElementById('tsNum').textContent=tsNum;
  document.getElementById('tsDen').textContent=tsDen;
  volSlider.value=Math.round(vol*100);
  // quarter all-on/off button label
  const allOn=onQ.every(v=>v);
  const qBtn=document.getElementById('qToggle');
  qBtn.textContent=allOn?'♩ 全ON':'♩ 全OFF';
  qBtn.classList.toggle('off',!allOn);
}
syncUI();

// ── Keyboard: space = play/stop ──
window.addEventListener('keydown',e=>{
  if(e.code==='Space' && e.target.tagName!=='INPUT'){
    e.preventDefault();
    playBtn.click();
  }
});

// Resume the AudioContext on the first user gesture (some browsers start it suspended).
function resumeAudio(){ const ctx=getCtx(); if(ctx.state==='suspended') ctx.resume(); }
document.addEventListener('pointerdown',resumeAudio,{once:true});

// ── Service Worker ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
