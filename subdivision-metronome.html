<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Subdivision Metronome</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SubDiv Metro">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  :root {
    --bg:      #0e0e10;
    --surface: #18181c;
    --border:  #2a2a32;
    --text:    #e8e8f0;
    --muted:   #5a5a6e;
    --accent:  #c9b97a;
    --clr-q:   #f5f0e8;
    --clr-32:  #8b7fd4;
    --clr-6:   #d4886a;
    --clr-64:  #4aaa84;
    --on-32:   rgba(139,127,212,0.25);
    --on-6:    rgba(212,136,106,0.22);
    --on-64:   rgba(74,170,132,0.20);
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background:var(--bg); color:var(--text); font-family:var(--mono);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:20px; padding:20px 14px;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
  }

  h1 { font-size:10px; font-weight:400; letter-spacing:0.28em; color:var(--muted); text-transform:uppercase; }

  /* ── BPM ── */
  .bpm-block { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .bpm-display { font-size:84px; font-weight:700; line-height:1; letter-spacing:-0.04em; color:var(--text); }
  .bpm-label   { font-size:10px; letter-spacing:0.3em; color:var(--muted); text-transform:uppercase; }
  .bpm-controls { display:flex; align-items:center; }
  .bpm-btn {
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:13px;
    width:42px; height:42px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation;
  }
  .bpm-btn:first-child { border-radius:6px 0 0 6px; }
  .bpm-btn:last-child  { border-radius:0 6px 6px 0; }
  .bpm-btn+.bpm-btn    { border-left:none; }
  .bpm-btn:active { background:var(--border); color:var(--accent); }
  input[type=range] {
    -webkit-appearance:none; width:160px; height:2px;
    background:var(--border); border:none; outline:none;
    cursor:pointer; border-left:none; border-right:none; touch-action:manipulation;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:18px; height:18px;
    border-radius:50%; background:var(--accent); cursor:pointer;
  }

  /* ── Grid section ── */
  .grid-section { width:100%; max-width:600px; display:flex; flex-direction:column; gap:8px; }
  .grid-row { display:flex; align-items:center; gap:8px; }
  .grid-label { font-size:9px; color:var(--muted); width:28px; text-align:right; flex-shrink:0; letter-spacing:0.08em; }
  .cells { display:flex; gap:2px; flex:1; }

  /* Quarter */
  .cell-q {
    flex:1; height:18px; border-radius:2px;
    background:var(--surface); border:1px solid var(--border);
    pointer-events:none;
    transition: background 0.03s, box-shadow 0.03s;
  }
  .cell-q.lit   { background:var(--clr-q);  border-color:var(--clr-q);  box-shadow:0 0 9px rgba(245,240,232,.5); }
  .cell-q.lit-a { background:var(--accent); border-color:var(--accent); box-shadow:0 0 13px rgba(201,185,122,.65); }

  /* Generic tappable cell base */
  .cell-tap {
    border-radius:2px; background:var(--surface); border:1px solid var(--border);
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.05s, border-color 0.05s, box-shadow 0.04s;
  }
  .cell-tap.beat-start { border-left:2px solid #3c3c4a; }

  /* 32nd */
  .cell-32 { flex:1; height:38px; }
  .cell-32.on  { background:var(--on-32); border-color:var(--clr-32); }
  .cell-32.lit { background:var(--clr-32) !important; border-color:var(--clr-32) !important; box-shadow:0 0 10px rgba(139,127,212,.8); }
  .cell-32.tap-flash { background:rgba(139,127,212,0.5) !important; }

  /* 6-tuplet */
  .cell-6  { flex:1; height:38px; }
  .cell-6.on  { background:var(--on-6); border-color:var(--clr-6); }
  .cell-6.lit { background:var(--clr-6) !important; border-color:var(--clr-6) !important; box-shadow:0 0 10px rgba(212,136,106,.8); }
  .cell-6.tap-flash { background:rgba(212,136,106,0.5) !important; }

  /* 64th */
  .cell-64 { flex:1; height:24px; }
  .cell-64.on  { background:var(--on-64); border-color:var(--clr-64); }
  .cell-64.lit { background:var(--clr-64) !important; border-color:var(--clr-64) !important; box-shadow:0 0 8px rgba(74,170,132,.8); }
  .cell-64.tap-flash { background:rgba(74,170,132,0.4) !important; }

  /* beat hints row */
  .beat-hints { display:flex; margin-left:36px; gap:2px; }
  .beat-hint  { flex:1; font-size:8px; color:var(--muted); padding-left:2px; }

  /* ── Zoom overlay ── */
  #zoomOverlay {
    display:none; position:fixed; inset:0; z-index:100;
    background:var(--bg); flex-direction:column;
    align-items:center; justify-content:center; gap:16px; padding:20px;
  }
  #zoomOverlay.open { display:flex; }
  .zoom-header {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; max-width:480px;
  }
  .zoom-title { font-size:11px; letter-spacing:0.2em; color:var(--muted); }
  .zoom-close {
    background:none; border:1px solid var(--border); color:var(--muted);
    font-family:var(--mono); font-size:11px; padding:6px 14px; border-radius:4px;
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  }
  .zoom-close:active { border-color:var(--text); color:var(--text); }

  .zoom-beat-nav {
    display:flex; gap:10px; align-items:center;
  }
  .zoom-nav-btn {
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:18px;
    width:48px; height:48px; border-radius:6px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  }
  .zoom-nav-btn:active { background:var(--border); }
  .zoom-beat-label { font-size:28px; font-weight:700; color:var(--text); min-width:60px; text-align:center; }

  .zoom-cells {
    display:flex; gap:5px; width:100%; max-width:480px;
  }
  .zoom-cell {
    flex:1; height:72px; border-radius:4px;
    background:var(--surface); border:2px solid var(--border);
    cursor:pointer; touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.05s, border-color 0.05s, box-shadow 0.05s;
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;
  }
  .zoom-cell span { font-size:8px; color:var(--muted); letter-spacing:0.05em; }
  .zoom-cell.on  { background:var(--on-32); border-color:var(--clr-32); }
  .zoom-cell.on span { color:var(--clr-32); }
  .zoom-cell.lit { background:var(--clr-32) !important; border-color:var(--clr-32) !important; box-shadow:0 0 14px rgba(139,127,212,.9); }
  .zoom-cell.tap-flash { background:rgba(139,127,212,0.5) !important; }

  .zoom-hint { font-size:9px; color:var(--muted); letter-spacing:0.1em; }

  /* ── Sub-row toggles ── */
  .sub-toggles { display:flex; gap:8px; flex-wrap:wrap; margin-left:36px; }
  .sub-toggle {
    background:none; border:1px solid var(--border); color:var(--muted);
    font-family:var(--mono); font-size:9px; letter-spacing:0.12em;
    padding:4px 10px; border-radius:3px; cursor:pointer;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: all 0.1s;
  }
  .sub-toggle.on-6  { border-color:var(--clr-6);  color:var(--clr-6);  background:var(--on-6);  }
  .sub-toggle.on-64 { border-color:var(--clr-64); color:var(--clr-64); background:var(--on-64); }

  /* zoom trigger */
  .zoom-btn {
    background:none; border:1px solid var(--border); color:var(--muted);
    font-family:var(--mono); font-size:9px; letter-spacing:0.12em;
    padding:4px 10px; border-radius:3px; cursor:pointer;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: all 0.1s;
  }
  .zoom-btn:active { border-color:var(--clr-32); color:var(--clr-32); }

  /* ── Play ── */
  .play-btn {
    width:70px; height:70px; border-radius:50%;
    border:2px solid var(--accent); background:transparent;
    color:var(--accent); font-size:26px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition: background 0.1s, transform 0.08s;
  }
  .play-btn:active { transform:scale(0.92); }
  .play-btn.playing { border-color:var(--text); color:var(--text); }

  /* ── Legend ── */
  .legend { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; font-size:9px; color:var(--muted); }
  .legend-item { display:flex; align-items:center; gap:4px; }
  .ldot { width:7px; height:7px; border-radius:1px; }
  .lq  { background:var(--clr-q); }
  .l32 { background:var(--clr-32); }
  .l6  { background:var(--clr-6); }
  .l64 { background:var(--clr-64); }
</style>
</head>
<body>

<h1>Subdivision Metronome</h1>

<!-- BPM -->
<div class="bpm-block">
  <div class="bpm-display" id="bpmDisplay">80</div>
  <div class="bpm-label">BPM</div>
  <div class="bpm-controls">
    <button class="bpm-btn" id="btnM10">−10</button>
    <button class="bpm-btn" id="btnM1">−1</button>
    <input type="range" id="bpmSlider" min="30" max="240" value="80">
    <button class="bpm-btn" id="btnP1">+1</button>
    <button class="bpm-btn" id="btnP10">+10</button>
  </div>
</div>

<!-- Main grid -->
<div class="grid-section">

  <!-- Quarter -->
  <div class="grid-row">
    <div class="grid-label">♩</div>
    <div class="cells" id="cellsQ"></div>
  </div>

  <!-- 32nd row + zoom button -->
  <div class="grid-row">
    <div class="grid-label">32</div>
    <div class="cells" id="cells32"></div>
  </div>
  <div class="beat-hints" id="hints32"></div>

  <!-- optional rows -->
  <div id="wrap6" style="display:none; flex-direction:column; gap:4px;">
    <div class="grid-row">
      <div class="grid-label">6連</div>
      <div class="cells" id="cells6"></div>
    </div>
    <div class="beat-hints" id="hints6"></div>
  </div>

  <div id="wrap64" style="display:none; flex-direction:column; gap:4px;">
    <div class="grid-row">
      <div class="grid-label">64</div>
      <div class="cells" id="cells64"></div>
    </div>
  </div>

  <!-- controls under grid -->
  <div class="sub-toggles">
    <button class="zoom-btn"   id="zoomBtn">🔍 32分ズーム</button>
    <button class="sub-toggle" id="toggle6">+ 6連グリッド</button>
    <button class="sub-toggle" id="toggle64">+ 64分</button>
  </div>
</div>

<!-- Play -->
<button class="play-btn" id="playBtn">▶</button>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="ldot lq"></div>四分（常時）</div>
  <div class="legend-item"><div class="ldot l32"></div>32分・タップON</div>
  <div class="legend-item"><div class="ldot l6"></div>6連・タップON</div>
  <div class="legend-item"><div class="ldot l64"></div>64分・タップON</div>
</div>

<!-- Zoom overlay -->
<div id="zoomOverlay">
  <div class="zoom-header">
    <div class="zoom-title">32分　ズームビュー</div>
    <button class="zoom-close" id="zoomClose">✕ 閉じる</button>
  </div>
  <div class="zoom-beat-nav">
    <button class="zoom-nav-btn" id="zoomPrev">◀</button>
    <div class="zoom-beat-label" id="zoomBeatLabel">拍 1</div>
    <button class="zoom-nav-btn" id="zoomNext">▶</button>
  </div>
  <div class="zoom-cells" id="zoomCells"></div>
  <div class="zoom-hint">セルをタップして ON / OFF</div>
</div>

<script>
// ═══════════════════════════════════════════
// Grid math
// Base = 192 steps/measure = LCM(64,24)
//   quarter  = 48 steps
//   32nd     =  6 steps  (192/32)
//   6-tuplet =  8 steps  (192/24)
//   64th     =  3 steps  (192/64)
// ═══════════════════════════════════════════
const BASE   = 192;
const Q_S    = 48;   // steps per quarter
const S32_S  = 6;    // steps per 32nd
const S6_S   = 8;    // steps per 6-tuplet subdivision
const S64_S  = 3;    // steps per 64th

const N32  = BASE / S32_S;   // 32 cells
const N6   = BASE / S6_S;    // 24 cells
const N64  = BASE / S64_S;   // 64 cells

const LOOKAHEAD = 0.025;
const SCHED_MS  = 10;

// ── State ──
let bpm = 80, playing = false;
let show6 = false, show64 = false;
let zoomBeat = 0; // 0..3

const on32 = new Array(N32).fill(false);   // 32 cells
const on6  = new Array(N6).fill(false);    // 24 cells
const on64 = new Array(N64).fill(false);   // 64 cells

let audioCtx = null, schedTimer = null;
let nextTime = 0, curStep = 0, displayStep = -1;

// ── Audio ──
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function snap(time, freq, gainPeak, decay) {
  const ctx = getCtx();
  // Noise burst
  const bufLen = Math.ceil(ctx.sampleRate * decay * 1.3);
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
  const ns = ctx.createBufferSource(); ns.buffer = buf;
  const nf = ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=freq*1.4; nf.Q.value=3;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(gainPeak * 0.55, time);
  ng.gain.exponentialRampToValueAtTime(0.0001, time + decay * 0.32);
  ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
  ns.start(time); ns.stop(time + decay * 0.36);

  // Tone
  const osc = ctx.createOscillator(); osc.type='sine';
  osc.frequency.setValueAtTime(freq * 2.9, time);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.52, time + decay * 0.16);
  const og = ctx.createGain();
  og.gain.setValueAtTime(0, time);
  og.gain.linearRampToValueAtTime(gainPeak, time + 0.0007);  // 0.7ms attack → sharp click
  og.gain.exponentialRampToValueAtTime(0.0001, time + decay);
  const hpf = ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=180;
  osc.connect(hpf); hpf.connect(og); og.connect(ctx.destination);
  osc.start(time); osc.stop(time + decay + 0.003);
}

const beatQ   = (t, first) => snap(t, first?1400:1000, first?0.88:0.70, first?0.038:0.030);
const beat32  = (t)        => snap(t, 680, 0.52, 0.019);
const beat6   = (t)        => snap(t, 520, 0.46, 0.019);
const beat64  = (t)        => snap(t, 400, 0.32, 0.013);

// ── Tap helper ──
function tappable(el, fn) {
  let touched = false;
  el.addEventListener('touchstart', e => {
    e.preventDefault(); touched = true;
    el.classList.add('tap-flash');
    fn();
    setTimeout(() => el.classList.remove('tap-flash'), 70);
  }, { passive: false });
  el.addEventListener('click', () => { if (touched){touched=false;return;} fn(); });
}

// ── Build cells ──
function buildQ() {
  const el = document.getElementById('cellsQ'); el.innerHTML='';
  for (let i=0;i<4;i++){const c=document.createElement('div');c.className='cell-q';el.appendChild(c);}
}

function buildGrid(containerId, cls, count, beatSize, onArr, hintId, hintCount) {
  const el = document.getElementById(containerId); el.innerHTML='';
  for (let i=0;i<count;i++) {
    const c = document.createElement('div');
    c.className = `cell-tap ${cls}` + (i % beatSize === 0 ? ' beat-start' : '');
    const idx = i;
    tappable(c, () => {
      onArr[idx] = !onArr[idx];
      c.classList.toggle('on', onArr[idx]);
      refreshZoom();
    });
    el.appendChild(c);
  }
  if (hintId) {
    const h = document.getElementById(hintId); h.innerHTML='';
    for (let i=0;i<count;i++){
      const hc=document.createElement('div'); hc.className='beat-hint';
      if (i % hintCount === 0) hc.textContent = Math.floor(i/hintCount)+1;
      h.appendChild(hc);
    }
  }
}

function build64() { buildGrid('cells64','cell-64',N64,S64_S*4,on64,null,0); }

buildQ();
buildGrid('cells32','cell-32',N32,N32/4,on32,'hints32',N32/4);
buildGrid('cells6', 'cell-6', N6, N6/4, on6, 'hints6',  N6/4);
build64();

// ── Zoom ──
function buildZoom() {
  const el = document.getElementById('zoomCells'); el.innerHTML='';
  const beatCells = N32/4; // 8 cells per beat
  const offset = zoomBeat * beatCells;
  document.getElementById('zoomBeatLabel').textContent = `拍 ${zoomBeat+1}`;
  for (let i=0;i<beatCells;i++){
    const idx = offset + i;
    const c = document.createElement('div');
    c.className = 'zoom-cell' + (on32[idx]?' on':'');
    const sp = document.createElement('span'); sp.textContent = i+1; c.appendChild(sp);
    tappable(c, () => {
      on32[idx] = !on32[idx];
      c.classList.toggle('on', on32[idx]);
      // sync main grid cell
      const mainCells = document.getElementById('cells32').children;
      mainCells[idx].classList.toggle('on', on32[idx]);
    });
    el.appendChild(c);
  }
}

function refreshZoom() {
  if (!document.getElementById('zoomOverlay').classList.contains('open')) return;
  const el = document.getElementById('zoomCells');
  const beatCells = N32/4;
  const offset = zoomBeat * beatCells;
  for (let i=0;i<beatCells;i++){
    el.children[i].classList.toggle('on', on32[offset+i]);
  }
}

// zoom display highlight
function updateZoomDisplay(step) {
  if (!document.getElementById('zoomOverlay').classList.contains('open')) return;
  const zc = document.getElementById('zoomCells');
  if (!zc.children.length) return;
  const beatCells = N32/4;
  const offset = zoomBeat * beatCells;
  // which 32nd cell is lit?
  const idx32 = Math.floor(step / S32_S);
  for (let i=0;i<beatCells;i++) {
    zc.children[i].classList.toggle('lit', idx32 === offset+i);
  }
}

tappable(document.getElementById('zoomBtn'), () => {
  buildZoom();
  document.getElementById('zoomOverlay').classList.add('open');
});
tappable(document.getElementById('zoomClose'), () => {
  document.getElementById('zoomOverlay').classList.remove('open');
});
tappable(document.getElementById('zoomPrev'), () => {
  zoomBeat = (zoomBeat+3)%4; buildZoom();
});
tappable(document.getElementById('zoomNext'), () => {
  zoomBeat = (zoomBeat+1)%4; buildZoom();
});

// ── Scheduler ──
function scheduleStep(step, time) {
  // Quarter
  if (step % Q_S === 0) { beatQ(time, step===0); return; }

  // 32nd (every S32_S steps, skip quarter positions)
  if (step % S32_S === 0) {
    const idx = step / S32_S;
    if (on32[idx]) beat32(time);
  }

  // 6-tuplet (every S6_S steps, skip quarter positions)
  if (step % S6_S === 0) {
    const idx = step / S6_S;
    // skip if falls on quarter beat
    if (step % Q_S !== 0 && on6[idx]) beat6(time);
  }

  // 64th (every S64_S steps, skip anything above)
  if (step % S64_S === 0) {
    const idx = step / S64_S;
    if (step % S6_S !== 0 && step % S32_S !== 0 && step % Q_S !== 0 && on64[idx]) beat64(time);
  }
}

function scheduler() {
  const ctx = getCtx();
  const stepDur = (60/bpm) / (Q_S); // duration of 1 base step (= 1/192 of measure... = 1/48 of quarter)
  // Actually: 1 quarter = Q_S steps, so step duration = (60/bpm)/Q_S
  while (nextTime < ctx.currentTime + LOOKAHEAD) {
    scheduleStep(curStep, nextTime);
    const s=curStep, t=nextTime;
    const delay = Math.max(0,(t-ctx.currentTime)*1000);
    setTimeout(()=>updateDisplay(s), delay);
    curStep=(curStep+1)%BASE;
    nextTime+=stepDur;
  }
}

function startMetronome() {
  const ctx=getCtx();
  if(ctx.state==='suspended') ctx.resume();
  curStep=0; nextTime=ctx.currentTime+0.05;
  schedTimer=setInterval(scheduler,SCHED_MS);
}
function stopMetronome() {
  clearInterval(schedTimer); clearDisplay(); displayStep=-1;
}

// ── Display ──
function clearDisplay() {
  for(const c of document.getElementById('cellsQ').children) c.classList.remove('lit','lit-a');
  for(const c of document.getElementById('cells32').children) c.classList.remove('lit');
  for(const c of document.getElementById('cells6').children)  c.classList.remove('lit');
  for(const c of document.getElementById('cells64').children) c.classList.remove('lit');
  const zc=document.getElementById('zoomCells');
  for(const c of zc.children) c.classList.remove('lit');
}

function updateDisplay(step) {
  if(step===displayStep) return; displayStep=step;
  const qC  = document.getElementById('cellsQ').children;
  const c32 = document.getElementById('cells32').children;
  const c6  = document.getElementById('cells6').children;
  const c64 = document.getElementById('cells64').children;

  for(const c of qC)  c.classList.remove('lit','lit-a');
  for(const c of c32) c.classList.remove('lit');
  for(const c of c6)  c.classList.remove('lit');
  for(const c of c64) c.classList.remove('lit');

  if(step%Q_S===0){ const qi=step/Q_S; qC[qi].classList.add(qi===0?'lit-a':'lit'); }
  c32[Math.floor(step/S32_S)].classList.add('lit');
  if(show6)  c6[Math.floor(step/S6_S)].classList.add('lit');
  if(show64) c64[Math.floor(step/S64_S)].classList.add('lit');

  updateZoomDisplay(step);
}

// ── BPM ──
function setBpm(v){
  bpm=Math.max(30,Math.min(240,v));
  document.getElementById('bpmDisplay').textContent=bpm;
  document.getElementById('bpmSlider').value=bpm;
}
document.getElementById('bpmSlider').addEventListener('input',e=>setBpm(+e.target.value));
document.getElementById('btnM10').addEventListener('click',()=>setBpm(bpm-10));
document.getElementById('btnM1').addEventListener('click', ()=>setBpm(bpm-1));
document.getElementById('btnP1').addEventListener('click', ()=>setBpm(bpm+1));
document.getElementById('btnP10').addEventListener('click',()=>setBpm(bpm+10));

// ── Play ──
const playBtn=document.getElementById('playBtn');
tappable(playBtn,()=>{
  playing=!playing;
  if(playing){playBtn.textContent='■';playBtn.classList.add('playing');startMetronome();}
  else        {playBtn.textContent='▶';playBtn.classList.remove('playing');stopMetronome();}
});

// ── Sub-row toggles ──
tappable(document.getElementById('toggle6'),()=>{
  show6=!show6;
  document.getElementById('wrap6').style.display=show6?'flex':'none';
  document.getElementById('toggle6').textContent=show6?'− 6連を隠す':'+ 6連グリッド';
  document.getElementById('toggle6').classList.toggle('on-6',show6);
});
tappable(document.getElementById('toggle64'),()=>{
  show64=!show64;
  document.getElementById('wrap64').style.display=show64?'flex':'none';
  document.getElementById('toggle64').textContent=show64?'− 64分を隠す':'+ 64分';
  document.getElementById('toggle64').classList.toggle('on-64',show64);
});

// ── Service Worker登録 ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
